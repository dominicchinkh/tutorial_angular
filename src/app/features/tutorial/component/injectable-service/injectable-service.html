<section>
    <h2>Car listing: </h2>
    <ul>
        @for (car of cars(); track car.id){
            <app-car-detail id="{{ car.id }}" name="{{ car.name }}"></app-car-detail>
        }
    </ul>
</section>

<section>
    <h2>Signal with Services: </h2>
    <div>
        Cart: {{ store.totalQuantity() }} items (${{ store.totalPrice() }})
    </div>
    <button #process (click)="processCheckout()">Processing cart</button>
    <div>
        <app-cart-display />
    </div>
</section>
